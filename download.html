<body>
<div class="card">
<h1>ROOF EXPRESS — Cloudflare Build</h1>
<p>247 pages &bull; All assets included &bull; Ready to upload</p>
<p class="status" id="status">Preparing download...</p>
<a class="btn" id="dlbtn" href="/api/download-build" download="roof-express-cloudflare.zip" target="_blank" rel="noopener">Download ZIP (~48 MB)</a>
<p class="alt">If the download doesn't start, right-click the button and choose "Save link as..."</p>
<p class="alt">Or copy and paste this into a new browser tab:<br><code id="directUrl"></code></p>
</div>
<script>
(function() {
  var fullUrl = window.location.origin + '/api/download-build';
  document.getElementById('directUrl').textContent = fullUrl;
  document.getElementById('dlbtn').href = fullUrl;
  document.getElementById('status').textContent = 'Ready to download!';

  document.getElementById('dlbtn').addEventListener('click', function(e) {
    if (window.self !== window.top) {
      e.preventDefault();
      window.open(fullUrl, '_blank');
    }
  });
})();
</script>
</body>
