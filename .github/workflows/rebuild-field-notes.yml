name: Rebuild Field Notes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and rebuild Field Notes
        env:
          COMPANYCAM_API_TOKEN: ${{ secrets.COMPANYCAM_API_TOKEN }}
        run: node script/rebuild-field-notes.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "Auto-rebuild Field Notes $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
